<svg width="640" height="180" viewBox="0 0 640 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="180">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1DB954"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="rounded">
      <rect width="640" height="180" rx="24"/>
    </clipPath>
  </defs>

  <rect width="640" height="180" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="638" height="178" rx="23" stroke="url(#accent)" stroke-opacity="0.65"/>

  <g clip-path="url(#rounded)" opacity="0.25">
    <circle cx="560" cy="18" r="120" fill="#8B5CF6">
      <animate attributeName="r" values="90;130;90" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="165" r="100" fill="#1DB954">
      <animate attributeName="r" values="70;110;70" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="28" y="28" width="124" height="124" rx="18" fill="#111827" stroke="#30363D"/>

  <g transform="translate(44 44)">
    <circle cx="46" cy="46" r="42" fill="#0D1117" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="46" cy="46" r="13" fill="#161B22" stroke="#8B5CF6" stroke-width="3"/>
    <path d="M31 44C42 34 56 34 66 44" stroke="#1DB954" stroke-width="4" stroke-linecap="round"/>
    <path d="M28 56C43 44 58 44 72 56" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="rotate" from="0 46 46" to="360 46 46" dur="16s" repeatCount="indefinite"/>
  </g>

  <text x="180" y="52" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="2">
    ON REPEAT
  </text>

  <text x="180" y="82" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    Am I Dreaming
  </text>

  <text x="180" y="110" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="500">
    Metro Boomin · A$AP Rocky · Roisee
  </text>

  <text x="180" y="134" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">
    METRO BOOMIN PRESENTS SPIDER-MAN: ACROSS THE SPIDER-VERSE
  </text>

  <rect x="180" y="150" width="360" height="5" rx="2.5" fill="#30363D"/>
  <rect x="180" y="150" width="218" height="5" rx="2.5" fill="url(#accent)">
    <animate attributeName="width" values="40;360;40" dur="9s" repeatCount="indefinite"/>
  </rect>

  <g transform="translate(560 118)" filter="url(#glow)">
    <rect x="0" y="16" width="5" height="18" rx="2.5" fill="#1DB954">
      <animate attributeName="height" values="10;30;14;24;10" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="24;4;20;10;24" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="11" y="8" width="5" height="26" rx="2.5" fill="#8B5CF6">
      <animate attributeName="height" values="28;12;34;16;28" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="6;22;0;18;6" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="22" y="18" width="5" height="16" rx="2.5" fill="#38BDF8">
      <animate attributeName="height" values="12;32;18;26;12" dur="0.95s" repeatCount="indefinite"/>
      <animate attributeName="y" values="22;2;16;8;22" dur="0.95s" repeatCount="indefinite"/>
    </rect>
    <rect x="33" y="10" width="5" height="24" rx="2.5" fill="#1DB954">
      <animate attributeName="height" values="24;14;30;18;24" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="10;20;4;16;10" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
