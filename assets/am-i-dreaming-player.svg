<svg width="640" height="180" viewBox="0 0 640 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="180">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1DB954"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <linearGradient id="progressFill" x1="180" y1="0" x2="510" y2="0">
      <stop offset="0" stop-color="#1DB954"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <linearGradient id="coverShade" x1="28" y1="28" x2="152" y2="152">
      <stop offset="0" stop-color="#000000" stop-opacity="0.00"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="coverShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="cardClip">
      <rect width="640" height="180" rx="24"/>
    </clipPath>

    <clipPath id="coverClip">
      <rect x="28" y="28" width="124" height="124" rx="18"/>
    </clipPath>
  </defs>

  <!-- Card -->
  <g filter="url(#cardShadow)">
    <rect width="640" height="180" rx="24" fill="url(#bg)"/>
    <rect x="1" y="1" width="638" height="178" rx="23" stroke="url(#accent)" stroke-opacity="0.55"/>
  </g>

  <!-- Ambient background -->
  <g clip-path="url(#cardClip)">
    <circle cx="560" cy="22" r="120" fill="#8B5CF6" opacity="0.18">
      <animate attributeName="r" values="100;132;100" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="162" r="100" fill="#1DB954" opacity="0.14">
      <animate attributeName="r" values="72;112;72" dur="8s" repeatCount="indefinite"/>
    </circle>

    <image
      href="am-i-dreaming-cover.png"
      x="0"
      y="0"
      width="640"
      height="180"
      preserveAspectRatio="xMidYMid slice"
      opacity="0.08"
    />
  </g>

  <!-- Cover -->
  <g filter="url(#coverShadow)">
    <rect x="28" y="28" width="124" height="124" rx="18" fill="#111827" stroke="#30363D"/>
    <image
      href="am-i-dreaming-cover.png"
      x="28"
      y="28"
      width="124"
      height="124"
      preserveAspectRatio="xMidYMid slice"
      clip-path="url(#coverClip)"
    />
    <rect x="28" y="28" width="124" height="124" rx="18" fill="url(#coverShade)"/>
    <rect x="28.5" y="28.5" width="123" height="123" rx="17.5" stroke="#FFFFFF" stroke-opacity="0.08"/>
  </g>

  <!-- Play button on cover -->
  <g transform="translate(90 90)">
    <circle r="18" fill="#FFFFFF" fill-opacity="0.92"/>
    <path d="M-4.5 -7 L8.5 0 L-4.5 7 Z" fill="#0D1117"/>
  </g>

  <!-- Tiny spotify badge -->
  <g transform="translate(180 28)">
    <circle cx="10" cy="10" r="10" fill="#1DB954"/>
    <path d="M5.8 8.1C8.9 6.9 12.3 7.1 15.2 8.9" stroke="#0D1117" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M6.5 11.2C9.1 10.2 11.6 10.4 13.8 11.8" stroke="#0D1117" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M7.2 14.1C9.1 13.4 10.9 13.6 12.5 14.5" stroke="#0D1117" stroke-width="1.4" stroke-linecap="round"/>
    <text x="28" y="14" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.6">
      ON REPEAT
    </text>
  </g>

  <!-- Main text -->
  <text x="180" y="74" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    Am I Dreaming
  </text>

  <text x="180" y="102" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="500">
    Metro Boomin · A$AP Rocky · Roisee
  </text>

  <text x="180" y="126" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">
    METRO BOOMIN PRESENTS SPIDER-MAN: ACROSS THE SPIDER-VERSE
  </text>

  <!-- Progress bar -->
  <rect x="180" y="146" width="330" height="6" rx="3" fill="#30363D"/>
  <rect x="180" y="146" width="128" height="6" rx="3" fill="url(#progressFill)">
    <animate attributeName="width" values="96;210;96" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Progress knob -->
  <circle cx="308" cy="149" r="5" fill="#FFFFFF">
    <animate attributeName="cx" values="276;390;276" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Time -->
  <text x="180" y="168" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">
    1:34
  </text>
  <text x="487" y="168" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" text-anchor="end">
    4:16
  </text>

  <!-- Equalizer -->
  <g transform="translate(548 118)" filter="url(#glow)">
    <rect x="0" y="16" width="5" height="18" rx="2.5" fill="#1DB954">
      <animate attributeName="height" values="10;30;14;24;10" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="24;4;20;10;24" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="11" y="8" width="5" height="26" rx="2.5" fill="#8B5CF6">
      <animate attributeName="height" values="28;12;34;16;28" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="6;22;0;18;6" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="22" y="18" width="5" height="16" rx="2.5" fill="#38BDF8">
      <animate attributeName="height" values="12;32;18;26;12" dur="0.95s" repeatCount="indefinite"/>
      <animate attributeName="y" values="22;2;16;8;22" dur="0.95s" repeatCount="indefinite"/>
    </rect>
    <rect x="33" y="10" width="5" height="24" rx="2.5" fill="#1DB954">
      <animate attributeName="height" values="24;14;30;18;24" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="10;20;4;16;10" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Open Spotify button -->
  <g transform="translate(534 28)">
    <rect width="78" height="28" rx="14" fill="#1DB954" fill-opacity="0.14" stroke="#1DB954" stroke-opacity="0.45"/>
    <circle cx="15" cy="14" r="7" fill="#1DB954"/>
    <path d="M11.8 12.8C13.8 12 16 12.2 17.8 13.4" stroke="#0D1117" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M12.3 14.9C14 14.2 15.5 14.4 16.9 15.2" stroke="#0D1117" stroke-width="1.05" stroke-linecap="round"/>
    <path d="M12.8 16.8C14.1 16.3 15.3 16.4 16.4 17" stroke="#0D1117" stroke-width="0.95" stroke-linecap="round"/>
    <text x="28" y="18" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">
      Spotify
    </text>
  </g>
</svg>
